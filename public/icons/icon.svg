<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#ff5a00" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff5a00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff7a2a"/>
      <stop offset="100%" stop-color="#ff5a00"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9955"/>
      <stop offset="100%" stop-color="#ff6a1a"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb380"/>
      <stop offset="100%" stop-color="#ff8040"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#ff5a00" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0d0d0d"/>

  <!-- Glow blob -->
  <ellipse cx="256" cy="320" rx="200" ry="140" fill="url(#glow)"/>

  <!-- Bar chart — 3 bars growing left to right -->
  <!-- Bar 1 (short) -->
  <rect x="108" y="300" width="72" height="112" rx="10" fill="url(#bar1)" opacity="0.7"/>
  <!-- Bar 2 (medium) -->
  <rect x="220" y="230" width="72" height="182" rx="10" fill="url(#bar2)" opacity="0.85"/>
  <!-- Bar 3 (tall) -->
  <rect x="332" y="155" width="72" height="257" rx="10" fill="url(#bar3)"/>

  <!-- Trend arrow on top of bar 3 -->
  <g filter="url(#shadow)">
    <!-- Arrow shaft: diagonal line from bar1 top-center to bar3 top-center -->
    <line x1="144" y1="294" x2="368" y2="149" stroke="#ff5a00" stroke-width="14" stroke-linecap="round"/>
    <!-- Arrowhead -->
    <polyline points="320,128 368,149 347,197" fill="none" stroke="#ff5a00" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
